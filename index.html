<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Açaí Mania | Management</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4a1d96">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1256/1256758.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fc; color: #1a1a1a; }
        [x-cloak] { display: none !important; }
        .active-tab { background: #4a1d96 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(74, 29, 150, 0.3); }
        .card { background: white; border-radius: 24px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .btn-price { transition: all 0.2s; border: 2px solid transparent; }
        .btn-price.selected { border-color: #4a1d96; background: #f5f3ff; color: #4a1d96; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#4a1d96] rounded-xl flex items-center justify-center shadow-lg shadow-purple-200 text-white font-black italic text-xl">A</div>
                <h1 class="font-extrabold text-lg tracking-tight hidden md:block">Açaí Mania <span class="text-purple-600">Cachambi</span></h1>
            </div>
            
            <div class="flex bg-gray-100 p-1 rounded-2xl w-full max-w-[280px] md:max-w-xs">
                <button @click="aba = 'vendas'" :class="aba === 'vendas' ? 'active-tab' : 'text-gray-500'" class="flex-1 py-2.5 rounded-xl text-[11px] font-extrabold uppercase tracking-wider transition-all">Vendas</button>
                <button @click="aba = 'gerencia'" :class="aba === 'gerencia' ? 'active-tab' : 'text-gray-500'" class="flex-1 py-2.5 rounded-xl text-[11px] font-extrabold uppercase tracking-wider transition-all">Gerência</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8" x-cloak>

        <template x-if="aba === 'vendas'">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-7 space-y-6">
                    <div class="card p-8">
                        <header class="flex justify-between items-center mb-8">
                            <div>
                                <h2 class="text-2xl font-extrabold text-gray-900" x-text="editandoId ? 'Editar Registro' : 'Lançar Pedido'"></h2>
                                <p class="text-xs text-gray-400 font-semibold uppercase tracking-widest mt-1">Preencha os detalhes abaixo</p>
                            </div>
                            <div x-show="editandoId" @click="limparForm()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black cursor-pointer hover:bg-red-100">CANCELAR</div>
                        </header>

                        <div class="grid grid-cols-3 gap-3 mb-8">
                            <template x-for="(valor, tam) in precos">
                                <button @click="pedido.tamanho = tam" 
                                    :class="pedido.tamanho === tam ? 'selected font-black' : 'bg-gray-50 text-gray-400 font-bold'"
                                    class="btn-price p-4 rounded-2xl text-sm" x-text="tam"></button>
                            </template>
                        </div>

                        <div class="space-y-3 mb-8">
                            <template x-for="(label, tipo) in tipos">
                                <button @click="pedido.tipo = tipo"
                                    :class="pedido.tipo === tipo ? 'selected font-black shadow-sm' : 'bg-white border border-gray-100 text-gray-500 font-bold'"
                                    class="btn-price w-full flex justify-between items-center p-5 rounded-2xl">
                                    <span class="text-sm" x-text="label"></span>
                                    <span class="text-lg" x-text="'R$ ' + precos[pedido.tamanho][tipo].toFixed(2)"></span>
                                </button>
                            </template>
                        </div>

                        <button @click="salvarVenda()" :disabled="loading"
                            :class="editandoId ? 'bg-amber-500' : 'bg-[#4a1d96]'"
                            class="w-full text-white py-5 rounded-[20px] font-extrabold text-lg shadow-xl shadow-purple-100 transition-all active:scale-95 disabled:opacity-50 flex justify-center gap-3">
                            <span x-text="loading ? 'Processando...' : (editandoId ? 'SALVAR ALTERAÇÃO' : 'FINALIZAR VENDA')"></span>
                            <span x-show="!loading" x-text="'R$ ' + calcularTotal().toFixed(2)"></span>
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-5 space-y-6">
                    <div class="card p-6">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6">Pedidos de Hoje</h3>
                        <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
                            <template x-for="v in vendasHoje()">
                                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-transparent hover:border-purple-200 transition group">
                                    <div class="flex items-center gap-4">
                                        <div class="w-2 h-10 bg-purple-200 rounded-full group-hover:bg-purple-600 transition-colors"></div>
                                        <div>
                                            <p class="text-sm font-black text-gray-800" x-text="v.tamanho"></p>
                                            <p class="text-[10px] text-gray-400 font-bold uppercase" x-text="v.hora_venda + ' • ' + tipos[v.tipo]"></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <span class="text-sm font-extrabold text-green-600" x-text="'R$ ' + v.total.toFixed(2)"></span>
                                        <button @click="prepararEdicao(v)" class="p-2 hover:bg-white rounded-lg transition shadow-sm">✏️</button>
                                    </div>
                                </div>
                            </template>
                            <template x-if="vendasHoje().length === 0">
                                <p class="text-center text-gray-300 text-xs font-bold py-10">Nenhuma venda registrada ainda.</p>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="aba === 'gerencia'">
            <div class="space-y-6">
                <div x-show="!auth" class="max-w-md mx-auto card p-10 text-center mt-12">
                    <div class="w-16 h-16 bg-purple-50 rounded-3xl flex items-center justify-center mx-auto mb-6 text-2xl shadow-inner">🔒</div>
                    <h2 class="text-xl font-extrabold mb-2">Área Administrativa</h2>
                    <p class="text-gray-400 text-xs mb-8">Digite o PIN para visualizar o faturamento</p>
                    <input type="password" x-model="senhaInput" placeholder="••••" class="w-full p-4 bg-gray-50 border-none rounded-2xl mb-4 text-center text-3xl tracking-[1rem] focus:ring-2 ring-purple-600 outline-none">
                    <button @click="checkLogin()" class="w-full bg-[#4a1d96] text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-purple-200">Entrar no Dashboard</button>
                </div>

                <div x-show="auth" class="space-y-8 animate-in fade-in duration-500">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 class="text-3xl font-black text-gray-900 tracking-tight">Dashboard de Gerência</h2>
                            <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mt-1">Análise de Performance Financeira</p>
                        </div>
                        <button @click="auth = false; senhaInput = ''" class="text-red-500 font-bold text-xs hover:bg-red-50 px-4 py-2 rounded-xl transition">ENCERRAR SESSÃO</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="card p-8 border-l-[12px] border-purple-600">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Faturamento Hoje</p>
                            <p class="text-4xl font-black text-gray-900" x-text="'R$ ' + kpis.hoje.toFixed(2)"></p>
                        </div>
                        <div class="card p-8 border-l-[12px] border-blue-500">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Últimos 7 dias</p>
                            <p class="text-4xl font-black text-gray-900" x-text="'R$ ' + kpis.semana.toFixed(2)"></p>
                        </div>
                        <div class="card p-8 border-l-[12px] border-green-500">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Faturamento Mensal</p>
                            <p class="text-4xl font-black text-gray-900" x-text="'R$ ' + kpis.mes.toFixed(2)"></p>
                        </div>
                    </div>

                    <div class="card overflow-hidden">
                        <header class="p-6 border-b border-gray-50 bg-gray-50/50 flex justify-between items-center">
                            <h3 class="font-extrabold text-sm text-gray-700 uppercase tracking-widest">Relatório Completo de Movimentação</h3>
                            <span class="text-[10px] bg-white px-3 py-1 rounded-full font-bold shadow-sm" x-text="vendas.length + ' transações'"></span>
                        </header>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="text-[10px] font-black text-gray-400 uppercase">
                                    <tr>
                                        <th class="p-6">Data & Hora</th>
                                        <th class="p-6">Produto Vendido</th>
                                        <th class="p-6">Tipo</th>
                                        <th class="p-6 text-right">Valor Líquido</th>
                                    </tr>
                                </thead>
                                <tbody class="text-sm font-semibold">
                                    <template x-for="v in vendas.slice().reverse()">
                                        <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition">
                                            <td class="p-6 text-gray-400 text-xs" x-text="v.data_venda + ' ' + v.hora_venda"></td>
                                            <td class="p-6 text-gray-900 font-extrabold" x-text="v.tamanho"></td>
                                            <td class="p-6">
                                                <span x-text="tipos[v.tipo]" class="text-[10px] bg-purple-50 text-purple-700 px-2 py-1 rounded-lg"></span>
                                                <template x-if="v.editado">
                                                    <span class="ml-2 text-[10px] text-amber-500 font-black italic">! EDITADO</span>
                                                </template>
                                            </td>
                                            <td class="p-6 text-right font-black text-green-600 text-lg" x-text="'R$ ' + v.total.toFixed(2)"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        // CONFIGURAÇÕES SUPABASE
        const SUPABASE_URL = 'https://ascyawnpyinzadvxrlna.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uF81MlGOAI5oLWVM4o9L6w_jKN90RXI';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function app() {
            return {
                aba: 'vendas',
                auth: false,
                loading: false,
                senhaInput: '',
                editandoId: null,
                vendas: [],
                hojeStr: new Date().toLocaleDateString('pt-BR'),
                pedido: { tamanho: '500ML', tipo: 'tradicional' },
                kpis: { hoje: 0, semana: 0, mes: 0 },

                precos: {
                    "200ML": { tradicional: 5.0, especial: 8.0, completo: 10.0 },
                    "330ML": { tradicional: 8.5, especial: 11.5, completo: 14.5 },
                    "400ML": { tradicional: 10.0, especial: 14.0, completo: 17.0 },
                    "500ML": { tradicional: 12.0, especial: 17.0, completo: 20.0 },
                    "700ML": { tradicional: 17.0, especial: 22.0, completo: 25.0 },
                    "1 LITRO": { tradicional: 23.0, especial: 29.0, completo: 32.0 }
                },

                tipos: {
                    tradicional: "Simples / Tradicional",
                    especial: "Nutella ou Frutas",
                    completo: "Nutella com Frutas"
                },

                async init() {
                    await this.fetchVendas();
                    // Escuta em Tempo Real
                    sb.channel('vendas-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'vendas' }, () => this.fetchVendas()).subscribe();
                },

                async fetchVendas() {
                    const { data, error } = await sb.from('vendas').select('*').order('created_at', { ascending: true });
                    if (!error) {
                        this.vendas = data || [];
                        this.updateKPIs();
                    }
                },

                vendasHoje() {
                    return this.vendas.filter(v => v.data_venda === this.hojeStr);
                },

                calcularTotal() {
                    return this.precos[this.pedido.tamanho][this.pedido.tipo];
                },

                async salvarVenda() {
                    this.loading = true;
                    const payload = {
                        tamanho: this.pedido.tamanho,
                        tipo: this.pedido.tipo,
                        total: this.calcularTotal(),
                        data_venda: new Date().toLocaleDateString('pt-BR'),
                        hora_venda: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                        editado: this.editandoId ? true : false
                    };

                    try {
                        if (this.editandoId) {
                            await sb.from('vendas').update(payload).eq('id', this.editandoId);
                        } else {
                            await sb.from('vendas').insert([payload]);
                        }
                        this.limparForm();
                        await this.fetchVendas();
                    } catch (e) {
                        alert("Erro ao salvar!");
                    } finally {
                        this.loading = false;
                    }
                },

                updateKPIs() {
                    const agora = new Date();
                    const weekMs = 7 * 24 * 60 * 60 * 1000;
                    this.kpis.hoje = this.vendas.filter(v => v.data_venda === this.hojeStr).reduce((a, b) => a + Number(b.total), 0);
                    this.kpis.semana = this.vendas.filter(v => (agora - new Date(v.created_at)) < weekMs).reduce((a, b) => a + Number(b.total), 0);
                    this.kpis.mes = this.vendas.filter(v => new Date(v.created_at).getMonth() === agora.getMonth()).reduce((a, b) => a + Number(b.total), 0);
                },

                prepararEdicao(v) {
                    this.editandoId = v.id;
                    this.pedido = { tamanho: v.tamanho, tipo: v.tipo };
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                limparForm() {
                    this.editandoId = null;
                    this.pedido = { tamanho: '500ML', tipo: 'tradicional' };
                },

                checkLogin() {
                    if(this.senhaInput === '1234') this.auth = true; // Mude aqui para a senha do seu primo
                    else alert("PIN incorreto");
                }
            }
        }
    </script>
</body>
</html>
