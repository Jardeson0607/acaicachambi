<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Açaí Mania | Dashboard</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4a1d96">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1256/1256758.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .btn-active { background-color: #4a1d96; color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74, 29, 150, 0.2); }
        input[type="password"] { letter-spacing: 0.5em; }
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body x-data="sistemaGestao()" x-init="init()">

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 glass border border-gray-100 px-2 py-2 rounded-2xl shadow-2xl flex gap-1 z-50">
        <button @click="aba = 'vendas'" :class="aba === 'vendas' ? 'btn-active' : 'text-gray-400'" class="flex items-center gap-2 px-6 py-3 rounded-xl text-xs font-bold transition-all">
            <span>🛒</span> Vendas
        </button>
        <button @click="aba = 'gerencia'" :class="aba === 'gerencia' ? 'btn-active' : 'text-gray-400'" class="flex items-center gap-2 px-6 py-3 rounded-xl text-xs font-bold transition-all">
            <span>📈</span> Gerência
        </button>
    </nav>

    <main class="max-w-md mx-auto p-5 pb-32" x-cloak>
        
        <header class="flex justify-between items-center mb-8 pt-4">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-[#4a1d96] rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">AM</div>
                <h1 class="font-extrabold text-gray-900 tracking-tight">Açaí Mania</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Status</p>
                <div class="flex items-center gap-1 justify-end">
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold text-green-600 uppercase">Cloud Online</span>
                </div>
            </div>
        </header>

        <template x-if="aba === 'vendas'">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm font-extrabold text-gray-800 uppercase tracking-tighter" x-text="editandoId ? '🔧 Ajustar Venda' : '⚡ Lançamento Rápido'"></h2>
                        <span x-show="editandoId" @click="cancelarEdicao()" class="text-[10px] text-red-500 font-bold cursor-pointer">CANCELAR</span>
                    </div>

                    <div class="grid grid-cols-3 gap-2 mb-6">
                        <template x-for="(valor, tam) in precos">
                            <button @click="pedido.tamanho = tam" 
                                :class="pedido.tamanho === tam ? 'border-2 border-[#4a1d96] bg-purple-50 text-[#4a1d96]' : 'bg-gray-50 text-gray-400'"
                                class="py-3 rounded-xl font-bold text-xs transition-all" x-text="tam"></button>
                        </template>
                    </div>

                    <div class="space-y-2 mb-8">
                        <template x-for="(label, tipo) in tipos">
                            <button @click="pedido.tipo = tipo"
                                :class="pedido.tipo === tipo ? 'bg-[#4a1d96] text-white shadow-lg shadow-purple-200' : 'bg-white border border-gray-100 text-gray-600'"
                                class="w-full flex justify-between items-center px-5 py-4 rounded-2xl transition-all">
                                <span class="text-xs font-bold" x-text="label"></span>
                                <span class="text-sm font-black" x-text="'R$ ' + precos[pedido.tamanho][tipo].toFixed(2)"></span>
                            </button>
                        </template>
                    </div>

                    <button @click="salvarVenda()" :disabled="loading"
                        class="w-full bg-gray-900 text-white py-5 rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition-all disabled:opacity-50">
                        <span x-text="loading ? '...' : (editandoId ? 'SALVAR ALTERAÇÃO' : 'CONFIRMAR VENDA (R$ ' + calcularTotal().toFixed(2) + ')')"></span>
                    </button>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm">
                    <h3 class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">Últimas de Hoje</h3>
                    <div class="space-y-4 max-h-64 overflow-y-auto custom-scroll">
                        <template x-for="v in vendas.filter(i => i.data_venda === hojeStr).slice().reverse()">
                            <div class="flex justify-between items-center group">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-xs">🥣</div>
                                    <div>
                                        <p class="text-xs font-bold text-gray-800" x-text="v.tamanho"></p>
                                        <p class="text-[9px] text-gray-400" x-text="v.hora_venda"></p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-xs font-black text-gray-900" x-text="'R$ ' + v.total.toFixed(2)"></span>
                                    <button @click="prepararEdicao(v)" class="text-xs grayscale hover:grayscale-0 transition">✏️</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="aba === 'gerencia'">
            <div class="space-y-4">
                <div x-show="!auth" class="bg-white p-10 rounded-[2.5rem] shadow-xl text-center border border-gray-50 mt-10">
                    <h2 class="text-lg font-extrabold mb-6">Acesso GERÊNCIA</h2>
                    <input type="password" x-model="senhaInput" placeholder="••••" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 text-center text-2xl outline-none focus:ring-2 ring-purple-500">
                    <button @click="checkLogin()" class="w-full bg-purple-900 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest">Entrar</button>
                </div>

                <div x-show="auth" class="space-y-6">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-xl font-black italic">GERÊNCIA</h2>
                        <button @click="auth = false" class="text-[10px] font-bold text-red-500">LOGOUT</button>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-[#4a1d96] text-white p-5 rounded-3xl shadow-lg">
                            <p class="text-[9px] font-bold opacity-60 uppercase mb-1">Faturamento Hoje</p>
                            <p class="text-2xl font-black" x-text="'R$ ' + kpis.hoje.toFixed(2)"></p>
                        </div>
                        <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm text-center">
                            <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Mês Atual</p>
                            <p class="text-2xl font-black text-gray-900" x-text="'R$ ' + kpis.mes.toFixed(2)"></p>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 text-center">Desempenho Semanal</h3>
                        <div class="flex justify-between items-end h-32 px-2">
                            <template x-for="dia in relatorioSemanal">
                                <div class="flex flex-col items-center gap-2">
                                    <div class="w-3 bg-purple-100 rounded-full flex flex-col justify-end h-24 overflow-hidden">
                                        <div class="bg-[#4a1d96] w-full transition-all duration-1000" :style="'height: ' + dia.porcentagem + '%'"></div>
                                    </div>
                                    <span class="text-[8px] font-bold text-gray-400" x-text="dia.nome"></span>
                                </div>
                            </template>
                        </div>
                        <div class="mt-6 pt-4 border-t text-center">
                            <p class="text-[10px] text-gray-400">Total 7 dias: <span class="text-gray-900 font-bold" x-text="'R$ ' + kpis.semana.toFixed(2)"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = 'https://ascyawnpyinzadvxrlna.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uF81MlGOAI5oLWVM4o9L6w_jKN90RXI';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function sistemaGestao() {
            return {
                aba: 'vendas',
                auth: false,
                loading: false,
                senhaInput: '',
                editandoId: null,
                vendas: [],
                hojeStr: new Date().toLocaleDateString('pt-BR'),
                pedido: { tamanho: '500ML', tipo: 'tradicional' },
                kpis: { hoje: 0, semana: 0, mes: 0 },
                relatorioSemanal: [],

                precos: {
                    "200ML": { tradicional: 5.0, especial: 8.0, completo: 10.0 },
                    "330ML": { tradicional: 8.5, especial: 11.5, completo: 14.5 },
                    "400ML": { tradicional: 10.0, especial: 14.0, completo: 17.0 },
                    "500ML": { tradicional: 12.0, especial: 17.0, completo: 20.0 },
                    "700ML": { tradicional: 17.0, especial: 22.0, completo: 25.0 },
                    "1 LITRO": { tradicional: 23.0, especial: 29.0, completo: 32.0 }
                },

                tipos: {
                    tradicional: "Tradicional",
                    especial: "Nutella/Fruta",
                    completo: "Nutella + Fruta"
                },

                async init() {
                    await this.buscarVendas();
                    supabaseClient.channel('vendas-live')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'vendas' }, () => this.buscarVendas())
                    .subscribe();
                },

                async buscarVendas() {
                    const { data, error } = await supabaseClient.from('vendas').select('*').order('created_at', { ascending: true });
                    if (!error) {
                        this.vendas = data || [];
                        this.calcularKPIs();
                        this.gerarGrafico();
                    }
                },

                calcularTotal() {
                    return this.precos[this.pedido.tamanho][this.pedido.tipo];
                },

                async salvarVenda() {
                    this.loading = true;
                    const total = this.calcularTotal();
                    const agora = new Date();

                    if (this.editandoId) {
                        await supabaseClient.from('vendas').update({ tamanho: this.pedido.tamanho, tipo: this.pedido.tipo, total: total, editado: true }).eq('id', this.editandoId);
                        this.editandoId = null;
                    } else {
                        await supabaseClient.from('vendas').insert([{
                            tamanho: this.pedido.tamanho, tipo: this.pedido.tipo, total: total,
                            data_venda: agora.toLocaleDateString('pt-BR'),
                            hora_venda: agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                        }]);
                    }
                    this.pedido = { tamanho: '500ML', tipo: 'tradicional' };
                    await this.buscarVendas();
                    this.loading = false;
                },

                calcularKPIs() {
                    const agora = new Date();
                    this.kpis.hoje = this.vendas.filter(v => v.data_venda === this.hojeStr).reduce((acc, v) => acc + Number(v.total), 0);
                    this.kpis.semana = this.vendas.filter(v => (agora - new Date(v.created_at)) < 7*24*60*60*1000).reduce((acc, v) => acc + Number(v.total), 0);
                    this.kpis.mes = this.vendas.filter(v => new Date(v.created_at).getMonth() === agora.getMonth()).reduce((acc, v) => acc + Number(v.total), 0);
                },

                gerarGrafico() {
                    const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                    const hoje = new Date();
                    this.relatorioSemanal = [];
                    
                    for (let i = 6; i >= 0; i--) {
                        let d = new Date();
                        d.setDate(hoje.getDate() - i);
                        let totalDia = this.vendas.filter(v => v.data_venda === d.toLocaleDateString('pt-BR')).reduce((acc, v) => acc + Number(v.total), 0);
                        this.relatorioSemanal.push({ nome: dias[d.getDay()], valor: totalDia, porcentagem: Math.min((totalDia / 500) * 100, 100) });
                    }
                },

                checkLogin() {
                    if(this.senhaInput === 'admin99') { this.auth = true; this.senhaInput = ''; }
                },

                prepararEdicao(venda) {
                    this.editandoId = venda.id;
                    this.pedido.tamanho = venda.tamanho;
                    this.pedido.tipo = venda.tipo;
                    this.aba = 'vendas';
                },

                cancelarEdicao() { this.editandoId = null; this.pedido = { tamanho: '500ML', tipo: 'tradicional' }; }
            }
        }
    </script>
</body>
</html>
